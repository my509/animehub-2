<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 AnimeHub - Đăng Nhập</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- Loading -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <p>Đang tải...</p>
    </div>

    <!-- Background -->
    <div class="bg-animated">
        <div class="bg-particles" id="bgParticles"></div>
    </div>

    <!-- Main Container -->
    <div class="login-container" id="loginContainer">
        <!-- Left - Brand -->
        <div class="login-left">
            <div class="brand-content">
                <div class="brand-logo">
                    <i class="fas fa-play-circle"></i>
                    <span>Anime<span class="text-accent">Hub</span></span>
                </div>
                <h1>Chào mừng đến với<br><span class="gradient-text">Vũ Trụ Hoạt Hình</span></h1>
                <p>Xem hàng ngàn bộ phim hoạt hình chất lượng cao, cập nhật liên tục mỗi ngày.</p>
                <div class="brand-stats">
                    <div class="stat-item"><strong>5000+</strong><span>Phim</span></div>
                    <div class="stat-item"><strong>Vietsub</strong><span>Phụ đề</span></div>
                    <div class="stat-item"><strong>4K</strong><span>Chất lượng</span></div>
                </div>
            </div>
        </div>

        <!-- Right - Form -->
        <div class="login-right">
            <div class="form-wrapper">
                <!-- Avatar -->
                <div class="avatar-box">
                    <img src="https://i.postimg.cc/6qXjHTp4/1B1FBB0B-7DC3-4E87-A94B-F8AFDB957689.png" 
                         alt="Avatar" 
                         id="avatarImg"
                         onerror="this.style.display='none';document.getElementById('avatarIcon').style.display='flex';">
                    <div class="avatar-icon" id="avatarIcon" style="display:none;">
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="form-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">
                        <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                    </button>
                    <button class="tab-btn" onclick="switchTab('register')">
                        <i class="fas fa-user-plus"></i> Đăng Ký
                    </button>
                </div>

                <!-- Login Form -->
                <div class="form-panel active" id="panel-login">
                    <!-- Social Buttons -->
                    <div class="social-row">
                        <button class="social-btn google" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn facebook" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i> Facebook
                        </button>
                    </div>
                    <div class="divider-text">hoặc</div>
                    <form onsubmit="return loginSubmit(event)">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="loginUser" placeholder="Tên đăng nhập hoặc Email" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPass" placeholder="Mật khẩu" required>
                            <i class="fas fa-eye toggle-pw" onclick="togglePassword('loginPass', this)"></i>
                        </div>
                        <label class="remember-row">
                            <input type="checkbox"> Ghi nhớ đăng nhập
                        </label>
                        <button type="submit" class="submit-btn login-btn">
                            <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                        </button>
                    </form>
                </div>

                <!-- Register Form -->
                <div class="form-panel" id="panel-register">
                    <form onsubmit="return registerSubmit(event)">
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regName" placeholder="Tên hiển thị" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPass" placeholder="Mật khẩu (4+ ký tự)" minlength="4" required>
                            <i class="fas fa-eye toggle-pw" onclick="togglePassword('regPass', this)"></i>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-check-circle"></i>
                            <input type="password" id="regConfirm" placeholder="Xác nhận mật khẩu" minlength="4" required>
                        </div>
                        <button type="submit" class="submit-btn register-btn">
                            <i class="fas fa-user-plus"></i> Tạo Tài Khoản
                        </button>
                    </form>
                </div>

                <!-- Message -->
                <div id="msgBox" class="msg-box"></div>

                <!-- Guest -->
                <button class="guest-link" onclick="guestLogin()">
                    <i class="fas fa-user-secret"></i> Vào với tư cách Khách
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/login.js"></script>
</body>
</html>
