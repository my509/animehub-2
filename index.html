<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AnimeHub - Nền tảng xem phim hoạt hình online chất lượng cao">
    <meta name="theme-color" content="#6c5ce7">
    <title>🔐 AnimeHub - Đăng Nhập</title>
    
    <!-- Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-text">Đang tải...</div>
        </div>
    </div>

    <!-- Animated Background -->
    <div class="bg-animated">
        <div class="bg-gradient"></div>
        <div class="bg-particles" id="bgParticles"></div>
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <!-- Main Container -->
    <div class="main-container" id="mainContainer">
        <!-- Left Panel - Branding -->
        <div class="brand-panel">
            <div class="brand-content">
                <!-- Logo -->
                <div class="brand-logo">
                    <div class="logo-icon">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <div class="logo-text">
                        <span class="logo-main">Anime</span>
                        <span class="logo-accent">Hub</span>
                    </div>
                </div>

                <!-- Tagline -->
                <h1 class="brand-title">
                    Chào mừng đến với<br>
                    <span class="gradient-text">Vũ Trụ Hoạt Hình</span>
                </h1>
                
                <p class="brand-description">
                    Khám phá hàng ngàn bộ phim hoạt hình đỉnh cao, 
                    từ cổ điển đến hiện đại, tất cả đều có Vietsub.
                </p>

                <!-- Features -->
                <div class="brand-features">
                    <div class="brand-feature">
                        <div class="feature-icon">
                            <i class="fas fa-film"></i>
                        </div>
                        <div class="feature-info">
                            <strong>5000+</strong>
                            <span>Phim hoạt hình</span>
                        </div>
                    </div>
                    <div class="brand-feature">
                        <div class="feature-icon">
                            <i class="fas fa-closed-captioning"></i>
                        </div>
                        <div class="feature-info">
                            <strong>Vietsub</strong>
                            <span>Phụ đề chuẩn</span>
                        </div>
                    </div>
                    <div class="brand-feature">
                        <div class="feature-icon">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <div class="feature-info">
                            <strong>4K</strong>
                            <span>Chất lượng cao</span>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="brand-footer">
                    <p>© 2024 AnimeHub. All rights reserved.</p>
                </div>
            </div>
        </div>

        <!-- Right Panel - Login Form -->
        <div class="login-panel">
            <div class="login-wrapper">
                <!-- Avatar -->
                <div class="login-avatar-container">
                    <div class="login-avatar">
                        <img src="https://i.postimg.cc/6qXjHTp4/1B1FBB0B-7DC3-4E87-A94B-F8AFDB957689.png" 
                             alt="Avatar" 
                             class="avatar-image"
                             id="avatarImage"
                             onerror="this.style.display='none';document.getElementById('avatarFallback').style.display='flex';">
                        <div class="avatar-fallback" id="avatarFallback" style="display:none;">
                            <i class="fas fa-user-astronaut"></i>
                        </div>
                    </div>
                </div>

                <!-- Form Container -->
                <div class="form-container" id="formContainer">
                    <!-- Tabs -->
                    <div class="form-tabs">
                        <button class="form-tab active" data-tab="login">
                            <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                        </button>
                        <button class="form-tab" data-tab="register">
                            <i class="fas fa-user-plus"></i> Đăng Ký
                        </button>
                    </div>

                    <!-- Login Form -->
                    <div class="form-content active" id="form-login">
                        <!-- Social Buttons -->
                        <div class="social-login-group">
                            <button class="social-btn google-btn" onclick="App.socialLogin('google')">
                                <i class="fab fa-google"></i>
                                <span>Google</span>
                            </button>
                            <button class="social-btn facebook-btn" onclick="App.socialLogin('facebook')">
                                <i class="fab fa-facebook-f"></i>
                                <span>Facebook</span>
                            </button>
                            <button class="social-btn guest-btn" onclick="App.guestLogin()">
                                <i class="fas fa-user-secret"></i>
                                <span>Khách</span>
                            </button>
                        </div>

                        <div class="divider">
                            <span>hoặc đăng nhập với</span>
                        </div>

                        <form id="loginForm" onsubmit="return App.handleLogin(event)" autocomplete="off">
                            <div class="input-field">
                                <div class="input-icon">
                                    <i class="fas fa-user"></i>
                                </div>
                                <input type="text" 
                                       id="loginUsername" 
                                       placeholder="Tên đăng nhập hoặc Email" 
                                       required
                                       autocomplete="username">
                            </div>

                            <div class="input-field">
                                <div class="input-icon">
                                    <i class="fas fa-lock"></i>
                                </div>
                                <input type="password" 
                                       id="loginPassword" 
                                       placeholder="Mật khẩu" 
                                       required
                                       autocomplete="current-password">
                                <div class="input-action" onclick="App.togglePassword('loginPassword', this)">
                                    <i class="fas fa-eye"></i>
                                </div>
                            </div>

                            <div class="form-options">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="rememberMe">
                                    <span class="checkbox-custom"></span>
                                    <span>Ghi nhớ</span>
                                </label>
                                <a href="#" class="forgot-link">Quên mật khẩu?</a>
                            </div>

                            <button type="submit" class="submit-btn login-submit">
                                <i class="fas fa-sign-in-alt"></i>
                                <span>Đăng Nhập</span>
                            </button>
                        </form>
                    </div>

                    <!-- Register Form -->
                    <div class="form-content" id="form-register">
                        <form id="registerForm" onsubmit="return App.handleRegister(event)" autocomplete="off">
                            <div class="input-field">
                                <div class="input-icon">
                                    <i class="fas fa-user"></i>
                                </div>
                                <input type="text" 
                                       id="regName" 
                                       placeholder="Tên hiển thị" 
                                       required>
                            </div>

                            <div class="input-field">
                                <div class="input-icon">
                                    <i class="fas fa-envelope"></i>
                                </div>
                                <input type="email" 
                                       id="regEmail" 
                                       placeholder="Email" 
                                       required
                                       autocomplete="email">
                            </div>

                            <div class="input-field">
                                <div class="input-icon">
                                    <i class="fas fa-lock"></i>
                                </div>
                                <input type="password" 
                                       id="regPassword" 
                                       placeholder="Mật khẩu (tối thiểu 4 ký tự)" 
                                       minlength="4" 
                                       required
                                       autocomplete="new-password">
                                <div class="input-action" onclick="App.togglePassword('regPassword', this)">
                                    <i class="fas fa-eye"></i>
                                </div>
                            </div>

                            <div class="input-field">
                                <div class="input-icon">
                                    <i class="fas fa-check-circle"></i>
                                </div>
                                <input type="password" 
                                       id="regConfirmPassword" 
                                       placeholder="Xác nhận mật khẩu" 
                                       minlength="4" 
                                       required>
                            </div>

                            <div class="form-options">
                                <label class="checkbox-label">
                                    <input type="checkbox" required>
                                    <span class="checkbox-custom"></span>
                                    <span>Tôi đồng ý với <a href="#">Điều khoản</a></span>
                                </label>
                            </div>

                            <button type="submit" class="submit-btn register-submit">
                                <i class="fas fa-user-plus"></i>
                                <span>Tạo Tài Khoản</span>
                            </button>
                        </form>
                    </div>

                    <!-- Message Box -->
                    <div class="message-box" id="messageBox"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="js/login.js"></script>
</body>
</html>
